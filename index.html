<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2c7be5" />
  <title>ふりがなブラウザ</title>
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./css/style.css" />
  <!-- 外部ライブラリ（仮置きCDN: 兄弟プロジェクトとバージョンが異なる場合は要修正） -->
  <script src="https://cdn.jsdelivr.net/npm/@mozilla/readability@0.5.0/Readability.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>
</head>
<body>
  <div id="chrome"></div>
  <main id="app" aria-live="polite">
    <p class="boot-msg">よみこみちゅう…</p>
  </main>

  <script src="./js/storage.js"></script>
  <script src="./js/furigana.js"></script>
  <script src="./js/extractor.js"></script>
  <script src="./js/fullcopy.js"></script>
  <script src="./js/linkrouter.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/home.js"></script>
  <script src="./js/search.js"></script>
  <script src="./js/browse.js"></script>
  <script src="./js/browserchrome.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.App.init();
    });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function (err) {
          console.warn('SW register failed:', err);
        });
      });
    }
  </script>
</body>
</html>
